// RSS
function guessCat(t){
  t=(t||'').toLowerCase();
  if(/automobile|automotive|car design|concept car|voiture|carrosserie|supercar|hypercar|lignes auto|carbody|carstyling|formtrends/.test(t))return'auto';
  if(/\bia\b|artificial intelligence|machine learning|gpt|llm/.test(t))return'ai';
  if(/motion|animation/.test(t))return'motion';
  if(/typograph|font|police/.test(t))return'typo';
  if(/brand|logo/.test(t))return'branding';
  if(/ux|user experience/.test(t))return'ux';
  if(/tech|futur|innovation/.test(t))return'tech';
  return'ui';
}
function timeAgo(d){try{const s=(Date.now()-new Date(d))/1000;if(s<0)return'';if(s<3600)return Math.floor(s/60)+'min';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'j';return Math.floor(s/604800)+'sem';}catch(e){return'';}}
const CACHE_MS=10*60*1000;

function fetchWithTimeout(url, ms=10000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{signal:ctrl.signal}).finally(()=>clearTimeout(tid));
}

function parseXML(xmlStr,feedTitle,feedId){
  try{
    const doc=new DOMParser().parseFromString(xmlStr,'text/xml');
    const items=[...doc.querySelectorAll('item, entry')].slice(0,50);
    return items.map((item,i)=>{
      const g=tag=>item.querySelector(tag)?.textContent?.trim()||'';
      const a=(tag,attr)=>item.querySelector(tag)?.getAttribute(attr)||'';
      const title=g('title')||'Sans titre';
      const link=g('link')||a('link','href')||'#';
      const pub=g('pubDate')||g('published')||g('updated')||'';
      const desc=g('description')||g('summary')||g('content')||'';
      // Extraire l'image — essayer tous les emplacements possibles
      let img=''
        ||a('enclosure','url')
        ||item.querySelector('media\\:content')?.getAttribute('url')
        ||item.querySelector('media\\:thumbnail')?.getAttribute('url')
        ||item.querySelector('image > url')?.textContent
        ||'';
      if(!img){
        // Chercher dans le contenu HTML
        const imgM=desc.match(/(?:src|href)=["']([^"']+\.(?:jpg|jpeg|png|webp|gif)(?:[^"'?#]*)?)["']/i);
        if(imgM)img=imgM[1];
      }
      if(!img){
        // og:image dans le contenu
        const ogM=desc.match(/property=["']og:image["'][^>]*content=["']([^"']+)["']/i)
          ||desc.match(/content=["']([^"']+)["'][^>]*property=["']og:image["']/i);
        if(ogM)img=ogM[1];
      }
      if(!img)img=svgImg(guessCat(title)||'auto');
      return{id:'rss_'+feedId+'_'+i,title,source:feedTitle,url:link,time:timeAgo(pub),pubDate:pub,year:pub?new Date(pub).getFullYear():2024,description:desc,cat:guessCat(title+' '+desc),img,read:'5 min',isRss:true,folderId:null};
    });
  }catch(e){return[];}
}

async function fetchFeed(feed){
  const encoded=encodeURIComponent(feed.url);

  // Proxy 1 : rss2json — le seul qui a fonctionné, en premier
  try{
    const r=await fetchWithTimeout(`https://api.rss2json.com/v1/api.json?rss_url=${encoded}`,4000);
    if(r.ok){
      const d=await r.json();
      if(d.status==='ok'&&d.items?.length){
        return d.items.slice(0,50).map((item,i)=>({
          id:'rss_'+feed.id+'_'+i,
          title:item.title||'Sans titre',
          source:feed.title,
          url:item.link||feed.url,
          time:timeAgo(item.pubDate),
          pubDate:item.pubDate||'',
          year:new Date(item.pubDate).getFullYear()||2024,
          description:item.description||item.content||'',
          cat:guessCat((item.title||'')+(item.description||'')),
          img:(()=>{
            let img=item.thumbnail||item.enclosure?.link||'';
            // Cherche dans le contenu HTML de l'article
            if(!img||img.length<10){
              const desc=item.description||item.content||'';
              const m=desc.match(/src=["']([^"']+\.(jpg|jpeg|png|webp)[^"']*)/i);
              if(m)img=m[1];
            }
            // Fallback placehold avec couleur par source
            if(!img||img.length<10) img=svgImg(guessCat(item.title)||'auto');
            return img;
          })(),
          read:'5 min',isRss:true,folderId:null,
        }));
      }
    }
  }catch(e){console.warn('[rss2json]',feed.title,e.message);}

  // Proxy 2 : allorigins + parser XML natif
  try{
    const r=await fetchWithTimeout(`https://api.allorigins.win/get?url=${encoded}`,4000);
    if(r.ok){const d=await r.json();if(d.contents){const a=parseXML(d.contents,feed.title,feed.id);if(a.length)return a;}}
  }catch(e){console.warn('[allorigins]',feed.title,e.message);}

  // Proxy 3 : corsproxy.io
  try{
    const r=await fetchWithTimeout(`https://corsproxy.io/?${encoded}`,4000);
    if(r.ok){const txt=await r.text();const a=parseXML(txt,feed.title,feed.id);if(a.length)return a;}
  }catch(e){console.warn('[corsproxy]',feed.title,e.message);}

  // Proxy 4 : scraping HTML direct du site (si tous les RSS ont échoué)
  const siteUrl=feed.url.replace(/\/(feed|rss|atom)(\/.*)?(\?.*)?$/,'').replace(/\/feed\/?$/,'');
  try{
    const r=await fetchWithTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(siteUrl)}`,5000);
    if(r.ok){
      const d=await r.json();
      if(d.contents){
        const scraped=scrapeHTML(d.contents,feed.title,feed.id,siteUrl);
        if(scraped.length){console.log('[scrape] OK',feed.title,scraped.length,'articles');return scraped;}
      }
    }
  }catch(e){console.warn('[scrape]',feed.title,e.message);}

  return[];
}

// Scraping HTML — extrait articles depuis la page d'accueil du site
function scrapeHTML(html, feedTitle, feedId, baseUrl){
  try{
    const doc=new DOMParser().parseFromString(html,'text/html');
    const base=new URL(baseUrl);
    const articles=[];
    const seen=new Set();

    // Sélecteurs courants pour les articles de blog/news
    const selectors=[
      'article','[class*="post"],[class*="article"],[class*="entry"],[class*="news-item"]',
      '.card','.item','[class*="card"]'
    ];

    let nodes=[];
    for(const sel of selectors){
      nodes=[...doc.querySelectorAll(sel)];
      if(nodes.length>=3)break;
    }

    // Fallback : chercher des liens avec titres h2/h3
    if(nodes.length<3){
      nodes=[...doc.querySelectorAll('h2 a, h3 a, h4 a')]
        .map(a=>a.closest('li,div,section')||a.parentElement)
        .filter(Boolean);
    }

    nodes.slice(0,50).forEach((node,i)=>{
      // Titre
      const titleEl=node.querySelector('h1,h2,h3,h4,[class*="title"],[class*="heading"]');
      const title=(titleEl?.textContent||'').trim();
      if(!title||title.length<10)return;
      if(seen.has(title))return;
      seen.add(title);

      // Lien
      const linkEl=node.querySelector('a[href]');
      let url=linkEl?.getAttribute('href')||'';
      if(!url)return;
      if(url.startsWith('/'))url=base.origin+url;
      else if(!url.startsWith('http'))url=base.origin+'/'+url;
      if(seen.has(url))return;
      seen.add(url);

      // Image — cherche og:image, puis première img > 100px
      let img='';
      const imgEl=node.querySelector('img[src]');
      const metaOgUrl=doc.querySelector('meta[property="og:image"]')?.getAttribute('content')||'';
      if(imgEl?.src&&imgEl.src.startsWith('http'))img=imgEl.src;
      else if(imgEl?.getAttribute('src')){
        const src=imgEl.getAttribute('src');
        img=src.startsWith('/')?base.origin+src:src;
      }
      if(!img&&metaOgUrl)img=metaOgUrl;
      if(!img)img=svgImg(guessCat(title));

      // Description
      const descEl=node.querySelector('p,[class*="excerpt"],[class*="summary"],[class*="desc"]');
      const description=(descEl?.textContent||'').trim().slice(0,200);

      // Date
      const dateEl=node.querySelector('time,[class*="date"],[class*="time"]');
      const pubDate=dateEl?.getAttribute('datetime')||dateEl?.textContent||'';

      articles.push({
        id:'scr_'+feedId+'_'+i,
        title,source:feedTitle,url,
        time:timeAgo(pubDate)||'',
        pubDate,
        year:pubDate?new Date(pubDate).getFullYear():new Date().getFullYear(),
        description,
        cat:guessCat(title+' '+description),
        img,
        read:'5 min',isRss:true,folderId:null,
      });
    });

    return articles;
  }catch(e){console.warn('scrapeHTML error:',e.message);return[];}
}
async function refreshAllFeeds(force=false){
  const now=Date.now();
  // Si on a des articles en cache récents (<15min) et pas force → refresh silencieux en arrière-plan
  const cacheAge=now-(S.rssLastFetch||0);
  const hasCached=S.rssArticles&&S.rssArticles.length>0;
  if(hasCached&&cacheAge<15*60*1000&&!force){
    // Refresh silencieux sans spinner
    _refreshSilent();
    return;
  }
  const feeds=S.folders.flatMap(f=>(f.feeds||[]).map(fd=>({...fd,folderId:f.id})));
  if(!feeds.length)return;
  if(!hasCached){S.rssLoading=true;S.rssError=null;S.feedStatus={};render();}
  else{S.rssLoading=true;}

  // Tous les flux en parallèle — pas de boucle séquentielle
  const allResults=await Promise.allSettled(feeds.map(f=>fetchFeed(f)));
  const results=[];
  allResults.forEach((r,i)=>{
    const feed=feeds[i];
    if(r.status==='fulfilled'&&r.value.length){
      const tagged=r.value.map(a=>({...a,source:feed.title,_feedId:feed.id,_folderId:feed.folderId}));
      results.push(...tagged);
      S.feedStatus[feed.id]={ok:true,count:r.value.length,title:feed.title};
    }else{
      S.feedStatus[feed.id]={ok:false,count:0,title:feed.title,error:r.reason?.message||'Échec'};
    }
  });
  if(results.length>0){
    S.rssArticles=results;S.rssLastFetch=now;saveState();
    const ok=Object.values(S.feedStatus).filter(s=>s.ok).length;
    const total=Object.values(S.feedStatus).length;
    toast(`✓ ${results.length} articles — ${ok}/${total} flux OK`);
  }else if(!hasCached){
    S.rssError='Aucun flux chargé. Vérifiez votre connexion.';
  }
  S.rssLoading=false;render();
}

// Refresh silencieux en arrière-plan (pas de spinner)
async function _refreshSilent(){
  const feeds=S.folders.flatMap(f=>(f.feeds||[]).map(fd=>({...fd,folderId:f.id})));
  const allResults=await Promise.allSettled(feeds.map(f=>fetchFeed(f)));
  const results=[];
  allResults.forEach((r,i)=>{
    const feed=feeds[i];
    if(r.status==='fulfilled'&&r.value.length){
      results.push(...r.value.map(a=>({...a,source:feed.title,_feedId:feed.id,_folderId:feed.folderId})));
      S.feedStatus[feed.id]={ok:true,count:r.value.length,title:feed.title};
    }else{
      S.feedStatus[feed.id]={ok:false,count:0,title:feed.title,error:r.reason?.message||'Échec'};
    }
  });
  if(results.length>0){
    S.rssArticles=results;S.rssLastFetch=Date.now();saveState();
    const scr=document.querySelector('.scr');const pos=scr?scr.scrollTop:0;
    render();
    const scr2=document.querySelector('.scr');if(scr2)scr2.scrollTop=pos;
  }
}

    if(k==='onclick')el.onclick=v;
    else if(k==='oninput')el.oninput=v;
    else if(k==='onchange')el.onchange=v;
    else if(k==='onkeydown')el.onkeydown=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k==='class')el.className=v;
    else if(k==='autofocus'){if(v)setTimeout(()=>el.focus(),50);}

}

// Convertit time/pubDate en timestamp pour tri universel
function timeToTs(a){
  if(a.pubDate){const d=new Date(a.pubDate);if(!isNaN(d))return d.getTime();}
  if(a.time){
    const t=a.time;const n=parseInt(t)||0;const now=Date.now();
    if(t.includes('min'))return now-n*60*1000;
    if(t.includes('h'))return now-n*3600*1000;
    if(t.includes('j'))return now-n*86400*1000;
    if(t.includes('sem'))return now-n*7*86400*1000;
  }
  return 0;
}
function getAllArticles(){
  const all=S.rssArticles&&S.rssArticles.length>0
    ?(()=>{
        const rssIds=new Set(S.rssArticles.map(a=>a.source+'_'+a.title.slice(0,30)));
        const uniqueFB=FB.filter(a=>!rssIds.has(a.source+'_'+a.title.slice(0,30)));
        return [...S.rssArticles,...uniqueFB];
      })()
    :FB;
  return all.sort((a,b)=>timeToTs(b)-timeToTs(a));
}
function getDisplayed(){
  const all=getAllArticles();
  const theme=S.themes.find(t=>t.id===S.filter);
  const folder=S.folders.find(f=>f.id===S.filter);
  return all.filter(a=>{
    if(theme){const s=(a.title+' '+a.cat).toLowerCase();return theme.keywords.some(k=>s.includes(k.toLowerCase()));}
    if(folder){
      return a._folderId===folder.id||
        (folder.feeds||[]).some(f=>{
          const src=(a.source||'').toLowerCase();
          const ftitle=f.title.toLowerCase();
          if(src.includes(ftitle)||ftitle.includes(src))return true;
          try{
            const fdomain=new URL(f.url).hostname.replace('www.','');
            if(src.includes(fdomain))return true;
            if(a.url){const adomain=new URL(a.url).hostname.replace('www.','');if(adomain===fdomain)return true;}
          }catch(e){}
          return false;
        });
    }
    if(S.filter==='all')return S.interests.includes(a.cat);
    return a.cat===S.filter;
  }).slice(0,S.maxArticles);
}

async function fetchExcerpt(article){
  if(!article.url||article.url==='#')return'';

    const encoded=encodeURIComponent(article.url);
    const r=await fetchWithTimeout(`https://api.allorigins.win/get?url=${encoded}`,5000);
    if(!r.ok)return'';
    const d=await r.json();
    if(!d.contents)return'';

    const doc=new DOMParser().parseFromString(d.contents,'text/html');

    // Supprimer les éléments inutiles
    ['script','style','nav','header','footer','aside','[class*="sidebar"]',
     '[class*="menu"]','[class*="comment"]','[class*="ad"]','[class*="social"]',
     'figure','noscript'].forEach(sel=>{
      doc.querySelectorAll(sel).forEach(el=>el.remove());
    });

    // Chercher le contenu principal dans l'ordre de priorité
    const candidates=[
      'article',
      '[class*="article-body"],[class*="article-content"],[class*="post-content"]',
      '[class*="entry-content"],[class*="content-body"],[class*="story-body"]',
      'main','.content','.post','.entry',
    ];

    let best='';
    for(const sel of candidates){
      const el=doc.querySelector(sel);
      if(el){
        const txt=(el.textContent||'').replace(/\s+/g,' ').trim();
        if(txt.length>best.length)best=txt;
        if(best.length>200)break;
      }
    }

    // Fallback : tous les <p> du body
    if(best.length<100){
      const paras=[...doc.querySelectorAll('p')]
        .map(p=>(p.textContent||'').trim())
        .filter(t=>t.length>40);
      best=paras.slice(0,4).join(' ');
    }

    // Nettoyer et tronquer
    const clean=best.replace(/\s+/g,' ').trim();
    return clean.length>500?clean.slice(0,500)+'…':clean;
  }catch(e){
    console.warn('[fetchExcerpt]',article.url,e.message);
    return'';
  }
}

function rDetail(){
  const a=S.detail;
  const w=h('div',{style:{display:'flex',flexDirection:'column',flex:1,overflow:'hidden',background:S.dark?'#111':'#fff'}});
  const dh=h('div',{class:'dhead',style:{flexShrink:0}});
  const dImg=h('img',{class:'dimg',alt:''});
  imgWithFallback(dImg,a.img,a.cat||'auto');
  dh.appendChild(dImg);
  const backBtn=h('button',{style:{position:'absolute',top:'16px',left:'16px',zIndex:99,background:'rgba(0,0,0,.6)',border:'none',borderRadius:'50%',width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',cursor:'pointer',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)'},onclick:(e)=>{e.stopPropagation();S.detail=null;render();}},ic('arrowLeft',22));
  dh.appendChild(backBtn);
  const cat=getCat(a.cat);
  const ov=h('div',{class:'dov'});
  ov.appendChild(h('span',{class:'chip'},cat.name));
  ov.appendChild(h('h1',{style:{color:'#fff',fontWeight:700,fontSize:18,lineHeight:1.3,marginTop:8}},a.title));
  dh.appendChild(ov);w.appendChild(dh);

  const db=h('div',{style:{flex:1,overflowY:'auto',paddingBottom:20}});

  // ── Meta + actions ──
  const metaWrap=h('div',{style:{padding:'16px 20px',borderBottom:'1px solid '+(S.dark?'#1f2937':'#e5e7eb'),display:'flex',justifyContent:'space-between',alignItems:'center'}});
  metaWrap.appendChild(h('div',{},[
    h('div',{style:{fontWeight:700,fontSize:13,color:S.dark?'#f3f4f6':'#111'}},a.source),
    h('div',{style:{fontSize:11,color:'#9ca3af',marginTop:2}},(a.time?a.time+' · ':'')+a.read),
  ]));
  const acts=h('div',{style:{display:'flex',gap:8}});
  const ob=h('button',{style:{padding:8,borderRadius:'50%',border:'none',cursor:'pointer',background:isOffline(a.id)?'#dcfce7':'#f3f4f6',color:isOffline(a.id)?'#16a34a':'#6b7280',display:'flex'},onclick:(e)=>toggleOffline(a,e)});
  ob.appendChild(ic(isOffline(a.id)?'check':'download',18));
  const bm=h('button',{style:{padding:8,borderRadius:'50%',border:'none',cursor:'pointer',background:'#f3f4f6',display:'flex'},onclick:(e)=>toggleSave(a,e)});
  const bi=ic('bookmark',18);bi.style.fill=isSaved(a.id)?S.themeColor:'none';bi.style.color=isSaved(a.id)?S.themeColor:'currentColor';bm.appendChild(bi);
  acts.appendChild(ob);acts.appendChild(bm);metaWrap.appendChild(acts);
  db.appendChild(metaWrap);

  // ── Extrait de l'article ──
  const bodyPad=h('div',{style:{padding:'20px 20px 0'}});

  // Extrait depuis description RSS si suffisamment riche (>80 chars après nettoyage)
  let rssExcerpt='';
  if(a.description){
    const tmp=document.createElement('div');
    tmp.innerHTML=a.description;
    rssExcerpt=(tmp.textContent||tmp.innerText||'').replace(/\s+/g,' ').trim();
  }

  if(rssExcerpt.length>80){
    // Description RSS suffisante → afficher directement
    const excerpt=rssExcerpt.slice(0,500);
    bodyPad.appendChild(h('p',{style:{fontSize:14,lineHeight:1.7,color:S.dark?'#d1d5db':'#374151',marginBottom:16}},excerpt+(rssExcerpt.length>500?'…':'')));
    db.appendChild(bodyPad);
  } else {
    // Pas de description ou trop courte → fetch de la page article
    const loadEl=h('div',{style:{display:'flex',alignItems:'center',gap:8,color:'#9ca3af',fontSize:13,fontStyle:'italic',marginBottom:16}});
    const spin=ic('refreshCw',14);spin.classList.add('spin');spin.style.color=S.themeColor;
    loadEl.appendChild(spin);
    loadEl.appendChild(document.createTextNode(' Chargement de l\'extrait…'));
    bodyPad.appendChild(loadEl);
    db.appendChild(bodyPad);

    // Fetch asynchrone du contenu de la page article
    if(a._excerpt!==undefined){
      // Déjà fetché (même session)
      loadEl.remove();
      if(a._excerpt){
        bodyPad.appendChild(h('p',{style:{fontSize:14,lineHeight:1.7,color:S.dark?'#d1d5db':'#374151',marginBottom:16}},a._excerpt));
      } else {
        bodyPad.appendChild(h('p',{style:{fontSize:13,color:'#9ca3af',fontStyle:'italic',marginBottom:16}},'Extrait non disponible. Lisez l\'article complet ci-dessous.'));
      }
    } else {
      fetchExcerpt(a).then(excerpt=>{
        a._excerpt=excerpt||'';
        loadEl.remove();
        if(excerpt&&excerpt.length>40){
          bodyPad.appendChild(h('p',{style:{fontSize:14,lineHeight:1.7,color:S.dark?'#d1d5db':'#374151',marginBottom:16}},excerpt));
        } else {
          bodyPad.appendChild(h('p',{style:{fontSize:13,color:'#9ca3af',fontStyle:'italic',marginBottom:16}},'Extrait non disponible. Lisez l\'article complet ci-dessous.'));
        }
      });
    }
  }

  // ── Bouton lire l'article ──
  const btnWrap=h('div',{style:{padding:'0 20px 24px'}});
  btnWrap.appendChild(h('button',{style:{width:'100%',padding:'14px',borderRadius:12,border:'none',background:S.dark?'#fff':'#000',color:S.dark?'#000':'#fff',fontWeight:700,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8},onclick:()=>window.open(a.url,'_blank')},['Lire l\'article complet ',ic('externalLink',16)]));
  db.appendChild(btnWrap);

  // ── Articles du même site ──
  const related=getAllArticles().filter(r=>r.id!==a.id&&r.source===a.source).slice(0,6);
  if(related.length>0){
    const relWrap=h('div',{style:{padding:'20px 20px 24px',borderTop:'1px solid '+(S.dark?'#1f2937':'#f0f0f0')}});
    relWrap.appendChild(h('p',{style:{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:'#9ca3af',marginBottom:16,display:'flex',alignItems:'center',gap:6}},[ic('list',13),' Autres articles — '+a.source]));
    related.forEach(r=>{
      const rtitle=r.title||'Sans titre';
      const rtime=r.time||'';
      let rexcerpt='';
      if(r.description){const tmp=document.createElement('div');tmp.innerHTML=r.description;rexcerpt=(tmp.textContent||tmp.innerText||'').replace(/\s+/g,' ').trim().slice(0,100);}
      const rc=h('div',{style:{display:'flex',gap:12,padding:'12px 0',borderBottom:'1px solid '+(S.dark?'#1f2937':'#f3f4f6'),cursor:'pointer',alignItems:'flex-start'},onclick:()=>{S.detail=r;render();}});
      const rImg=document.createElement('img');
      rImg.style.cssText='width:80px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#1f2937;';
      rImg.alt='';rImg.src=r.img||svgImg(a.cat||'auto');
      rImg.onerror=function(){this.onerror=null;this.src=svgImg(a.cat||'auto');};
      const rInfo=document.createElement('div');
      rInfo.style.cssText='flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;';
      const rTitle=document.createElement('p');
      rTitle.style.cssText='font-size:13px;font-weight:600;line-height:1.4;color:'+(S.dark?'#f3f4f6':'#111')+';display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin:0;';
      rTitle.textContent=rtitle;
      rInfo.appendChild(rTitle);
      if(rexcerpt){const rDesc=document.createElement('p');rDesc.style.cssText='font-size:11px;line-height:1.5;color:'+(S.dark?'#9ca3af':'#6b7280')+';display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin:0;';rDesc.textContent=rexcerpt+(rexcerpt.length===100?'…':'');rInfo.appendChild(rDesc);}
      if(rtime){const rTime=document.createElement('p');rTime.style.cssText='font-size:10px;color:#9ca3af;margin:0;';rTime.textContent=rtime;rInfo.appendChild(rTime);}
      rc.appendChild(rImg);rc.appendChild(rInfo);relWrap.appendChild(rc);
    });
    db.appendChild(relWrap);
  }

  w.appendChild(db);return w;
}

    body.appendChild(card);
  }
  w.appendChild(body);
  w.appendChild(h('div',{style:{padding:16,borderTop:'1px solid #e5e7eb'}},[h('button',{class:'bprimary',style:{background:S.searchQ&&!S.searching?S.themeColor:'#9ca3af'},onclick:doSearch},'Rechercher')]));
  return w;
}

// INIT
render();
refreshAllFeeds(true);

// ── PWA : enregistrement du Service Worker ──
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[SW] Enregistré:', reg.scope))
      .catch(err => console.warn('[SW] Erreur:', err));
  });
}

// ── PWA : capture de l'événement d'installation ──
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  window._installPrompt = e;
  // Mettre à jour le bouton si déjà rendu
  const btn = document.getElementById('pwa-install-btn');
  if(btn) btn.style.display = 'flex';
  render();
});

window.addEventListener('appinstalled', () => {
  window._installPrompt = null;
  render();
});
</script>
</body>
</html>
